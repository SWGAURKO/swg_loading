<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SWG Loading Screen</title>
<script src="./config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;user-select:none}

/* ── Background video ── */
#bg-video{position:fixed;top:50%;left:50%;width:112vw;height:112vh;transform:translate(-50%,-50%);object-fit:cover;z-index:0;pointer-events:none;border:none}

/* ── Overlays ── */
.overlay-tint{position:fixed;inset:0;background:#6bbfff;mix-blend-mode:multiply;opacity:.18;z-index:1;pointer-events:none}
.overlay-grad-b{position:fixed;inset:0;background:linear-gradient(to top,#000 0%,rgba(0,0,0,.45) 40%,transparent 100%);z-index:2;pointer-events:none}
.overlay-grad-l{position:fixed;inset:0;background:linear-gradient(to right,rgba(0,0,0,.92) 0%,rgba(0,0,0,.4) 45%,transparent 100%);z-index:2;pointer-events:none}
.overlay-texture{position:fixed;inset:0;background-image:url('./assets/overlays-y5Gd7DCV.png');background-size:125% 125%;background-position:center;opacity:.55;mix-blend-mode:screen;z-index:3;pointer-events:none}

/* ── Main layout ── */
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:space-between;padding:28px 32px}

/* ── Logo / branding ── */
#brand{display:flex;align-items:center;gap:6px}
#brand img{width:88px;height:88px;object-fit:contain;mix-blend-mode:screen;filter:drop-shadow(0 0 18px rgba(107,191,255,.55))}
#brand-text{display:flex;flex-direction:column;line-height:1}
#brand-name{font-size:36px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#6bbfff;text-shadow:0 0 14px rgba(107,191,255,.35);font-family:'Orbitron','Segoe UI',sans-serif}
#brand-tag{font-size:11px;font-weight:500;letter-spacing:.42em;text-transform:uppercase;color:rgba(255,255,255,.82);margin-top:2px;font-family:'Oswald','Segoe UI',sans-serif}

/* ── Middle row ── */
#middle{display:flex;align-items:center;justify-content:space-between;flex:1;padding:24px 0}

/* ── Welcome block ── */
#welcome{max-width:520px}
#welcome h1{font-size:clamp(48px,6vw,72px);font-weight:900;text-transform:uppercase;letter-spacing:.05em;line-height:1;margin-bottom:12px}
#welcome p{font-size:14px;color:#d1d5db;line-height:1.65;max-width:420px;margin-bottom:28px}
#welcome-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 22px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;transition:all .2s;cursor:pointer;border:none}
.btn-primary{background:#6bbfff;color:#000;box-shadow:0 0 14px rgba(107,191,255,.3)}
.btn-primary:hover{background:#4aa6eb;box-shadow:0 0 20px rgba(107,191,255,.45)}
.btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);background-image:linear-gradient(to bottom,rgba(255,255,255,.1),rgba(255,255,255,.04))}
.btn-secondary:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28)}
#online-badge{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding-left:4px}
#online-dot{width:8px;height:8px;border-radius:50%;background:#6bbfff;animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}

/* ── Spotlight panel ── */
#spotlight{width:340px;flex-shrink:0;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.09);padding:16px;box-shadow:0 18px 40px rgba(0,0,0,.35);display:none}
@media(min-width:1024px){#spotlight{display:block}}
#spotlight-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
#spotlight-tag{font-size:15px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#6bbfff;text-shadow:0 0 5px rgba(255,255,255,.3)}
#spotlight-sub{font-size:12px;font-weight:400;text-transform:uppercase;color:#fff;margin-top:3px;letter-spacing:.05em}
.badge{border-radius:999px;border:1px solid rgba(107,191,255,.3);background:rgba(107,191,255,.18);padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#fff}

/* main card */
#main-card{position:relative;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);margin-bottom:8px;height:220px}
#main-card img{width:100%;height:145px;object-fit:cover;display:block;flex-shrink:0}
.card-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent 55%);pointer-events:none}
#main-card-info{padding:10px 12px}
#main-card-title{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#main-card-story{font-size:10px;color:rgba(255,255,255,.68);line-height:1.55;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;border:1px solid rgba(107,191,255,.3);background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;z-index:5;font-size:16px;line-height:1}
.nav-btn:hover{background:#6bbfff;color:#000;box-shadow:0 0 22px rgba(107,191,255,.45)}
#nav-prev{left:8px}
#nav-next{right:8px}

/* mini cards */
#mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini-card{border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);height:160px;position:relative}
.mini-card img{width:100%;height:90px;object-fit:cover;display:block}
.mini-card-info{padding:8px 10px}
.mini-card-title{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-card-story{font-size:9px;color:rgba(255,255,255,.62);line-height:1.5;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Mute button ── */
#mute-bar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:10px}
#btn-mute{display:flex;align-items:center;gap:8px;background:rgba(59,59,61,.5);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 16px;color:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 4px 10px rgba(18,18,18,.35)}
#btn-mute:hover{background:rgba(107,191,255,.15);border-color:rgba(107,191,255,.4);color:#6bbfff}

/* ── Progress bar ── */
#progress-section{width:100%}
#progress-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
#progress-label{display:flex;align-items:center;gap:8px}
#progress-spinner{width:18px;height:18px;border:2px solid rgba(107,191,255,.3);border-top-color:#6bbfff;border-radius:50%;animation:spin 1s linear infinite}
#progress-status-text{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6bbfff;font-family:'Oswald','Segoe UI',sans-serif}
#progress-stage{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.1em;text-transform:uppercase;margin-left:4px}
#progress-pct{font-size:20px;font-weight:700;color:#fff}
#progress-track{width:100%;height:7px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden}
#progress-fill{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,#fff,#06c2fc);transition:width .3s ease-out;position:relative;overflow:hidden}
#progress-shine{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shine 2s infinite}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes successShine{
  0%  {background:linear-gradient(90deg,#fff,#06c2fc);box-shadow:0 0 0 #06c2fc}
  50% {background:linear-gradient(90deg,#06c2fc,#fff,#06c2fc);box-shadow:0 0 20px 8px rgba(6,194,252,.4)}
  100%{background:linear-gradient(90deg,#fff,#06c2fc);box-shadow:0 0 30px 12px rgba(6,194,252,0)}
}
</style>
</head>
<body>

<!-- Background video -->
<video id="bg-video" autoplay muted loop playsinline preload="auto"></video>
<div class="overlay-tint"></div>
<div class="overlay-grad-b"></div>
<div class="overlay-grad-l"></div>
<div class="overlay-texture"></div>

<!-- App -->
<div id="app">

  <!-- Top: branding -->
  <div id="brand">
    <img id="brand-logo" src="./assets/Logo.png" alt="Logo"/>
    <div id="brand-text">
      <span id="brand-name"></span>
      <span id="brand-tag"></span>
    </div>
  </div>

  <!-- Middle: welcome + spotlight -->
  <div id="middle">
    <div id="welcome">
      <h1 id="welcome-title"></h1>
      <p id="welcome-text"></p>
      <div id="welcome-btns">
        <a id="btn-discord" class="btn btn-primary" href="#" target="_blank" rel="noreferrer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Discord
        </a>
        <a id="btn-website" class="btn btn-secondary" href="#" target="_blank" rel="noreferrer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Website
        </a>
      </div>
      <div id="online-badge">
        <span id="online-dot"></span>
        <span>Online</span>
      </div>
    </div>

    <!-- Spotlight panel -->
    <div id="spotlight">
      <div id="spotlight-header">
        <div>
          <div id="spotlight-tag"></div>
          <div id="spotlight-sub">Photos &amp; Stories</div>
        </div>
        <div class="badge">Live Feed</div>
      </div>

      <!-- Main card -->
      <div id="main-card">
        <img id="main-img" src="" alt=""/>
        <div class="card-grad"></div>
        <button class="nav-btn" id="nav-prev">&#8249;</button>
        <button class="nav-btn" id="nav-next">&#8250;</button>
        <div id="main-card-info">
          <div id="main-card-title"></div>
          <div id="main-card-story"></div>
        </div>
      </div>

      <!-- Mini cards -->
      <div id="mini-cards">
        <div class="mini-card" id="mini-0">
          <img src="" alt=""/>
          <div class="card-grad"></div>
          <div class="mini-card-info">
            <div class="mini-card-title"></div>
            <div class="mini-card-story"></div>
          </div>
        </div>
        <div class="mini-card" id="mini-1">
          <img src="" alt=""/>
          <div class="card-grad"></div>
          <div class="mini-card-info">
            <div class="mini-card-title"></div>
            <div class="mini-card-story"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom: mute btn + progress -->
  <div>
    <div id="mute-bar">
      <button id="btn-mute">
        <svg id="icon-sound" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="icon-mute" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        <span id="mute-label">Sound On</span>
      </button>
    </div>

    <div id="progress-section">
      <div id="progress-header">
        <div id="progress-label">
          <div id="progress-spinner"></div>
          <span id="progress-status-text">Please Wait</span>
          <span id="progress-stage">Connecting...</span>
        </div>
        <div id="progress-pct">0%</div>
      </div>
      <div id="progress-track">
        <div id="progress-fill">
          <div id="progress-shine"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  var cfg = window.SWG_CONFIG || {};

  // ── Branding ──────────────────────────────────────────────
  document.getElementById('brand-name').textContent  = cfg.serverName    || 'SWG';
  document.getElementById('brand-tag').textContent   = cfg.serverTagline || 'ROLEPLAY';
  document.getElementById('welcome-title').textContent = cfg.welcomeTitle || 'Welcome,';
  document.getElementById('welcome-text').textContent  = cfg.welcomeText  || '';
  document.getElementById('btn-discord').href  = cfg.discordUrl  || '#';
  document.getElementById('btn-website').href  = cfg.websiteUrl  || '#';

  // ── Background video ──────────────────────────────────────
  var vid = document.getElementById('bg-video');
  var vUrl = cfg.videoUrl || '';

  // Streamable share URL → fetch real mp4 via API
  var smMatch = vUrl.match(/streamable\.com\/([a-z0-9]+)$/i);
  if (smMatch) {
    fetch('https://api.streamable.com/videos/' + smMatch[1])
      .then(function(r){ return r.json(); })
      .then(function(data){
        var files = data && data.files;
        var mp4 = (files && (files['mp4-mobile'] || files['mp4']));
        if (mp4 && mp4.url) {
          vid.src = mp4.url.replace(/^\/\//, 'https://');
        }
      })
      .catch(function(){ vid.src = vUrl; });
  } else if (vUrl) {
    vid.src = vUrl;
  }

  // ── Spotlight ─────────────────────────────────────────────
  var spots = cfg.communitySpotlights || [];
  var spotEl = document.getElementById('spotlight');

  if (!cfg.spotlightEnabled || spots.length === 0) {
    spotEl.style.display = 'none';
  } else {
    document.getElementById('spotlight-tag').textContent = cfg.spotlightTag || '#LIFEINSWG';
    var idx = 0;

    function renderSpotlight() {
      var main  = spots[idx % spots.length];
      var mini0 = spots[(idx + 1) % spots.length];
      var mini1 = spots[(idx + 2) % spots.length];

      document.getElementById('main-img').src           = main.image;
      document.getElementById('main-img').alt           = main.title;
      document.getElementById('main-card-title').textContent = main.title;
      document.getElementById('main-card-story').textContent = main.story;

      var m0 = document.getElementById('mini-0');
      m0.querySelector('img').src = mini0.image;
      m0.querySelector('img').alt = mini0.title;
      m0.querySelector('.mini-card-title').textContent = mini0.title;
      m0.querySelector('.mini-card-story').textContent = mini0.story;

      var m1 = document.getElementById('mini-1');
      m1.querySelector('img').src = mini1.image;
      m1.querySelector('img').alt = mini1.title;
      m1.querySelector('.mini-card-title').textContent = mini1.title;
      m1.querySelector('.mini-card-story').textContent = mini1.story;
    }

    renderSpotlight();
    document.getElementById('nav-prev').onclick = function () { idx = (idx - 1 + spots.length) % spots.length; renderSpotlight(); };
    document.getElementById('nav-next').onclick = function () { idx = (idx + 1) % spots.length; renderSpotlight(); };
  }

  // ── Mute / unmute video audio ────────────────────────────
  var muted = true; // starts muted (browser autoplay policy)
  var btnMute = document.getElementById('btn-mute');
  btnMute.onclick = function () {
    muted = !muted;
    vid.muted = muted;
    document.getElementById('icon-sound').style.display = muted ? 'none' : '';
    document.getElementById('icon-mute').style.display  = muted ? ''     : 'none';
    document.getElementById('mute-label').textContent   = muted ? 'Sound Off' : 'Sound On';
  };

  // ── Progress / loading ────────────────────────────────────
  var pct   = 0;
  var rawPct = 0;
  var stageLabel = {
    INIT_BEFORE_MAP_LOADED: 'Loading map',
    INIT_AFTER_MAP_LOADED:  'Loading resources',
    INIT_SESSION:           'Starting session'
  };

  function getStageText(p) {
    if (p >= 100) return 'Cleaning up';
    if (p >= 90)  return 'Finalizing';
    if (p >= 80)  return 'Loading textures';
    if (p >= 70)  return 'Loading resources';
    if (p >= 60)  return 'Initializing game';
    if (p >= 50)  return 'Loading data files';
    if (p >= 40)  return 'Loading assets';
    if (p >= 30)  return 'Loading components';
    if (p >= 20)  return 'Initializing';
    if (p >= 10)  return 'Starting';
    return 'Connecting';
  }

  function setProgress(val) {
    pct = Math.min(Math.max(val, 0), 100);
    var fill  = document.getElementById('progress-fill');
    var shine = document.getElementById('progress-shine');
    fill.style.width = pct + '%';
    document.getElementById('progress-pct').textContent = Math.round(pct) + '%';
    document.getElementById('progress-stage').textContent = getStageText(pct) + '...';
    if (pct >= 100) {
      fill.style.animation = 'successShine .8s ease-out';
      shine.style.display  = 'none';
    } else {
      fill.style.animation = '';
      shine.style.display  = '';
    }
  }

  // FiveM NUI message handler
  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d) return;
    if (typeof d === 'string') { try { d = JSON.parse(d); } catch(ex) { return; } }

    var ev = d.eventName || d.action || d.type;

    // loadProgress (0-1 fraction)
    if (ev === 'loadProgress' && typeof d.loadFraction === 'number') {
      rawPct = Math.min(Math.max(d.loadFraction * 100, 0), 100);
      setProgress(Math.max(rawPct, pct));
      return;
    }

    // playerData
    if (ev === 'playerData' || (d.data && typeof d.data.priority === 'number')) {
      return; // priority queue — no visual change needed
    }

    // stage events
    var stageEvents = new Set(['startInitFunction','initFunctionInvoked','startInitFunctionOrder',
      'startDataFileEntries','initFunctionInvoking','onDataFileEntry',
      'performMapLoadFunction','endInitFunction','endDataFileEntries']);
    if (stageEvents.has(ev)) {
      var amount = (d.payload && (d.payload.amount || d.payload.acount)) || 1;
      setProgress(pct + amount);
    }

    // syncStageEvent
    if (ev === 'syncStageEvent' && d.payload) {
      var type = d.payload.type;
      var amt  = d.payload.amount || d.payload.acount || 1;
      if (type === 'INIT_SESSION') setProgress(Math.max(pct, 80));
      else setProgress(pct + amt);
    }
  });

  // nuiHandoverData (initial state)
  if (window.nuiHandoverData) {
    var hd = window.nuiHandoverData;
    if (hd.loadFraction) setProgress(hd.loadFraction * 100);
  }

})();
</script>
</body>
</html>
